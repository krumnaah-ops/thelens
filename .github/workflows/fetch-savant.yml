name: Fetch Savant Data

"on":
  # Runs daily at 9:00 AM ET (13:00 UTC) — after overnight games are final
  schedule:
    - cron: '0 13 * * *'
  # Also allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python fetch_savant.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update savant data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
